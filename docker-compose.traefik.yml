# Публикация LORE через Traefik по HTTPS — оверлей, применяется ТОЛЬКО на сервере.
#
# ЗАЧЕМ. Вход по OIDC невозможен на `http://192.168.3.131:4400` — и это не
# настройка, а свойство браузера: `crypto.subtle` существует только в защищённом
# контексте (https либо localhost). oidc-client-ts использует его для PKCE,
# поэтому на LAN-адресе по http вызов падает, AuthGate остаётся без сессии, и
# страница гаснет без редиректа на Keycloak.
#
# Пока стенд жил на ноуте и открывался как `http://localhost:4400`, всё работало:
# localhost — единственное исключение в спецификации. Переезд сменил адрес, и от
# адреса незаметно зависела доступность криптографии.
#
# ПОЧЕМУ ИМЯ, А НЕ IP. Публичные CA не выдают сертификаты на приватные адреса —
# на 192.168.3.131 Let's Encrypt не выпишет ничего. Остался бы самоподписанный,
# с предупреждением на каждом заходе и добавлением своего CA на каждое
# устройство. Имя `lore.odal.seidrstudio.pro` уже резолвится в этот же LAN-адрес,
# и на него сертификат выдаётся через DNS-01 — этому способу входящая
# доступность не нужна, значит наружу ничего открывать не требуется.
#
# ПОЧЕМУ ОВЕРЛЕЕМ. Сеть `headscale-net` существует только на ci-server. Объявить
# её в основном compose означало бы сломать `docker compose up` на ноуте: сети
# нет — стенд не поднимается. Оверлей подключается переменной COMPOSE_FILE в CD.
#
# ВНИМАНИЕ: новый origin — это ТРИ независимых списка, и забытый любой даёт свой
# отказ на своём этапе:
#   1. CORS_ORIGINS            — иначе чтение работает, а запись 403 («кнопки не работают»);
#   2. redirectUris у lore-app — иначе KC отобьёт вход сразу после пароля;
#   3. webOrigins у lore-app   — иначе обмен кода на токен упрётся в CORS уже у KC.

services:
  lore-app:
    networks:
      - default
      - headscale-net
    labels:
      traefik.enable: "true"
      # Сеть указывается явно: у контейнера их две, и без этого Traefik может
      # выбрать не ту и слать трафик в недостижимый адрес.
      traefik.docker.network: headscale-net
      traefik.http.routers.lore.rule: Host(`lore.odal.seidrstudio.pro`)
      traefik.http.routers.lore.entrypoints: websecure
      traefik.http.routers.lore.tls.certresolver: regru
      # ipAllowList здесь НЕТ СОЗНАТЕЛЬНО — он на этом Traefik не работает и
      # работать не может, пока порты публикуются через docker-proxy.
      #
      # Замер 2026-07-19: middleware отбивал запросы с адресом `172.19.0.1` —
      # это шлюз docker-моста. docker-proxy подменяет адрес источника, поэтому
      # до middleware доезжает ОДИН И ТОТ ЖЕ внутренний адрес для всех клиентов,
      # откуда бы они ни пришли. Различить локального и внешнего невозможно.
      #
      # Отсюда два исхода, и оба ложные:
      #   без 172.16.0.0/12 в списке → закрыто ДЛЯ ВСЕХ, включая владельца;
      #   с 172.16.0.0/12          → открыто ДЛЯ ВСЕХ, включая интернет,
      #                              при этом выглядит как работающая защита.
      # Второй опаснее: он не даёт ни одного отказа и читается как «защищено».
      #
      # Настоящая защита выбрана другая — аутентификация на само чтение
      # (MIG-30): она не зависит от того, чей адрес видит прокси. Сетевое
      # ограничение вернётся только вместе с `userland-proxy: false` в демоне
      # Docker либо Traefik в host-режиме, когда исходные адреса станут видны.
      # Порт ВНУТРИ контейнера (nginx слушает 80), не опубликованный 4400.
      traefik.http.services.lore.loadbalancer.server.port: "80"

networks:
  headscale-net:
    external: true
