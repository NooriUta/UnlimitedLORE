services:
  # Object storage for BRAGI asset uploads (images) — follows the naming
  # convention already agreed for Dali in DALI_FILE_UPLOAD_SPEC.md (Decision
  # #22), so a future Dali/Heimdall S3 rollout can reuse the same env-var
  # shape even though no service currently runs this in the monorepo.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # unless-stopped, а НЕ always: при снятии бэкапов контейнеры останавливают
    # намеренно, и always поднял бы их обратно посреди снимка, испортив его.
    # Дефолт (no) означал, что после перезагрузки хоста стек не поднимется —
    # а проявилось бы это как «MCP не отвечает», уводя диагностику не туда.
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-aida}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-aidapassword}
    volumes:
      - lore-minio-data:/data

  # Independent Quarkus backend — copied lore+bench logic, talks to the SAME
  # ArcadeDB (:2480 on the host) as the main project. Replaces heimdall-backend :9093.
  lore-backend:
    restart: unless-stopped          # см. комментарий у minio
    build:
      context: ./backend
      dockerfile: Dockerfile.local
      args:
        # Build-time, а не runtime: quarkus.oidc.enabled фиксируется на сборке,
        # и запечённое значение побеждает переменную окружения контейнера.
        # Флипать ВМЕСТЕ с VITE_* у фронта (docs/AUTH_OMILORE.md).
        LORE_AUTH_ENABLED: ${LORE_AUTH_ENABLED:-}
        LORE_OIDC_ISSUER: ${LORE_OIDC_ISSUER:-}
        # Зеркало Nexus для Gradle ВНУТРИ сборки образа. Это отдельный Gradle,
        # не тот, что на шагах раннера: он не наследует ни прокси раннера, ни
        # его gradle.properties, и ходит наружу сам.
        #
        # Из-за этого CD упал 2026-07-19 за 27 секунд — не по таймауту, а вовсе
        # не дотянувшись: `P=""` (прокси в сборку не передан) → «Gradle пойдёт
        # напрямую» → `Plugin [id: 'io.quarkus'] was not found`. Формулировка
        # уводит в сторону: выглядит как отсутствующий плагин, а на деле нет
        # маршрута до plugins.gradle.org.
        #
        # Зеркало решает это лучше прокси: оно в локальной сети, из контейнера
        # сборки видно напрямую, внешний канал с критического пути уходит.
        # Пустое значение = зеркала нет, поведение прежнее (см. Dockerfile).
        LORE_MAVEN_MIRROR: ${LORE_MAVEN_MIRROR:-}
        LORE_PLUGIN_MIRROR: ${LORE_PLUGIN_MIRROR:-}
        # Прокси — запасной путь на случай, если зеркало недоступно, и
        # единственный для того, что через него не идёт: сам дистрибутив Gradle
        # (~130 МБ) обёртка тянет с services.gradle.org, и в чистом базовом
        # образе кэша нет. На раннере он лежит в образе, внутри сборки — нет.
        #
        # backend-ci это уже передаёт, а CD не передавал ничего — отсюда `P=""`
        # и отказ 2026-07-19. Одна и та же сборка в двух workflow расходилась
        # по способу запуска, и расхождение было невидимым.
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
      # Прокси у раннера прописан как host.docker.internal, а на Linux-демоне
      # это имя само не резолвится — без явного отображения build-arg указывал
      # бы на несуществующий хост, и сборка шла бы напрямую, то есть никуда.
      extra_hosts:
        - "host.docker.internal:host-gateway"
    ports:
      # IPv4-only bind: Docker's bare "9100:9100" shorthand also publishes an
      # IPv6 [::]:9100 listener, and on this host `localhost` resolves to ::1
      # first — that IPv6 path hangs instead of connection-refusing, so any
      # client using bare "localhost" (curl, Node's fetch, the LORE MCP
      # server) stalls until timeout. Loopback-only matches the actual use
      # (host-side MCP server on the same machine) — same pattern minio's
      # 9001 console port already uses below.
      - "127.0.0.1:9100:9100"          # published so the host-side MCP server can reach it
    extra_hosts:
      # ARCADE_HOST: где живёт ArcadeDB с system_aida_lore.
      #   host-gateway    — локальный контейнер Ygg на ноуте (как было);
      #   192.168.3.131   — ci-server, куда база переехала (три СУБД на ноуте — перебор).
      # Переключение обратно = одна строка в .env, без правки compose.
      - "arcade:${ARCADE_HOST:-host-gateway}"
      # KC_HOST — по той же схеме, что ARCADE_HOST и FORGEJO_HOST. Keycloak
      # переехал на ci-server вместе со своей БД (realm omilore и master на
      # месте, пароль админа прежний: admin/admin из compose применяется только
      # к ПУСТОЙ базе, а её перевезли целиком).
      # Путь одинаков на обоих хостах — /kc/realms/…, без префикса оба дают 404,
      # так что смена хоста ничего в маршрутах не ломает.
      - "kc:${KC_HOST:-host-gateway}"
      # FORGEJO_HOST — по той же схеме, что ARCADE_HOST. Переключение на ci-server
      # ждёт доступа: SSH-ключ ноута там не авторизован, API-токена в .env нет.
      - "forgejo:${FORGEJO_HOST:-host-gateway}"
      # INFISICAL_HOST — секрет-сервис (D15). Нужен, только когда
      # lore.secrets.provider=infisical; при provider=env имя просто не
      # используется, и его недоступность ничего не значит.
      - "infisical:${INFISICAL_HOST:-host-gateway}"
    depends_on:
      - minio
    environment:
      - MART_ARCADE_URL=http://arcade:2480
      - ARCADEDB_USER=${ARCADEDB_USER:-root}
      - ARCADEDB_ROOT_PASSWORD=${ARCADEDB_ROOT_PASSWORD:-unset}
      # ── Auth: флаги нужны и на СБОРКЕ, и в РАНТАЙМЕ ──────────────────────────
      # Передавать их только в build.args НЕДОСТАТОЧНО, и это ровно тот отказ,
      # на котором деплой падал (AL-53). Свойства расходятся по времени жизни:
      #
      #   quarkus.oidc.enabled  — BUILD-TIME: расширение OIDC впекается в образ;
      #   quarkus.oidc.auth-server-url — RUNTIME: читается при старте;
      #   SeerRoleFromTokenFilter читает quarkus.oidc.enabled ТОЖЕ В РАНТАЙМЕ,
      #   а в application.properties это `${LORE_AUTH_ENABLED:false}`.
      #
      # Без переменной в окружении контейнера выражение резолвится в false, и
      # фильтр НЕ снимает клиентский X-Seer-Role — при том что расширение OIDC
      # в образе включено. Итог: auth «включён», заголовку по-прежнему верят,
      # `auth_enabled` отвечает false. Ни одной ошибки в логах.
      #
      # Проверено на одном и том же артефакте (2026-07-19): запуск без этих
      # переменных → подделанный `X-Seer-Role: admin` даёт 200; с ними → 403.
      #
      # Форма БЕЗ "=" намеренна, как у CORS_ORIGINS ниже: так compose передаёт
      # переменную, только если она задана. Пустая строка здесь перекрыла бы
      # дефолт `:false` и уронила бы преобразование в boolean (SRCFG00040,
      # ADR-CI-001-D5).
      - LORE_AUTH_ENABLED
      - LORE_OIDC_ISSUER
      # KC-мост (ADR-LORE-025 D11/D14): пусто → /lore/kc/* отвечает 503
      # "not configured", остальной LORE работает как обычно (pluggable).
      # Секрет читается через SecretProvider (D15): env | infisical.
      - KC_ADMIN_CLIENT_SECRET=${KC_ADMIN_CLIENT_SECRET:-}
      # НЕ ${KC_ADMIN_URL}: в .env он localhost (для host-скриптов), а внутри
      # контейнера localhost = сам контейнер. Ходим через kc:host-gateway.
      - kc.admin.url=http://kc:18180/kc
      - kc.admin.realm=${KC_ADMIN_REALM:-omilore}
      # CORS: перечислять надо СЕРВИРУЮЩИЕ адреса — те, по которым UI открывают
      # в браузере. Пусто → дефолт из application.properties (localhost + адрес
      # стенда + lore.odal). Отсутствие нужного адреса даёт 403 ТОЛЬКО на записи:
      # на GET браузер Origin не шлёт, поэтому выглядит как «кнопки не работают».
      # Форма БЕЗ "=" намеренна: так compose пробрасывает переменную, только
      # если она задана, и не подставляет пустую строку. Пустая строка здесь
      # перекрыла бы дефолт и заблокировала запись со ВСЕХ адресов сразу.
      - CORS_ORIGINS
      - lore.secrets.provider=${LORE_SECRETS_PROVIDER:-env}
      # Machine identity (Universal Auth) — единственный путь в свежих сборках
      # Infisical: сервисные токены оттуда убраны. project-id и environment
      # ОБЯЗАТЕЛЬНЫ: access-token сам по себе не говорит, из какого проекта
      # читать, и без них сервис отвечает 400 — а выглядит это как «секрета нет».
      - lore.secrets.url=${LORE_SECRETS_URL:-http://infisical:18080}
      - lore.secrets.client-id=${LORE_SECRETS_CLIENT_ID:-}
      - lore.secrets.client-secret=${LORE_SECRETS_CLIENT_SECRET:-}
      - lore.secrets.project-id=${LORE_SECRETS_PROJECT_ID:-}
      - lore.secrets.environment=${LORE_SECRETS_ENVIRONMENT:-prod}
      - lore.secrets.scope=${LORE_SECRETS_SCOPE:-/lore}
      # Forgejo-мост (ADR-LORE-024, FJ-02): пусто → /lore/forgejo/* отвечает 503,
      # LORE без self-hosted Forgejo работает как раньше. Токен вводит ВЛАДЕЛЕЦ
      # в .env — агенты его не трогают; чтение только через SecretProvider.
      - FORGEJO_API_TOKEN=${FORGEJO_API_TOKEN:-}
      # base_url в KnowGitProject.hosts — localhost:3030 (адрес для ХОСТА);
      # из контейнера это сам контейнер, поэтому API-адрес переопределяется,
      # а owner/repo продолжают резолвиться из hosts[] (FJ-02).
      - lore.forgejo.base-override=${FORGEJO_BASE_OVERRIDE:-http://forgejo:3030}
      # ADR-LORE-023: dev-стенд получает версию-маркер и раннер миграций
      # (OQ-023-DEVSTAND). При pending-шагах на БД с данными раннер сначала
      # снимает BACKUP DATABASE (SV-04); упавший шаг валит старт ГРОМКО.
      - lore.migrate=${LORE_MIGRATE:-true}
      - BENCH_ROOT=/bench-data
      - TEAM_DOCS_ROOT=/team-docs
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-bragi-assets}
      - S3_ACCESS_KEY=${MINIO_USER:-aida}
      - S3_SECRET_KEY=${MINIO_PASSWORD:-aidapassword}
      - S3_REGION=us-east-1
    volumes:
      # Пути вынесены в переменные: были зашиты как C:/AIDA/... — валидно на
      # ноуте, но на Linux-сервере docker отвергает такую спецификацию тома
      # («invalid volume specification»), и контейнер не стартует вовсе.
      # Дефолты — внутрирепозиторные, поэтому на сервере стенд поднимается
      # без настройки; на ноуте прежние пути задаются в .env.
      - ${BENCH_DATA_DIR:-./docs/bench-data}:/bench-data:ro   # STATUS.json + report html
      - ${TEAM_DOCS_DIR:-./docs}:/team-docs:ro                # ingestion source (opt-in)
    healthcheck:
      # Liveness (process up), not readiness — so an ArcadeDB blip doesn't flap
      # the container. Readiness (DB-gated) lives at /q/health/ready for monitoring.
      test: ["CMD", "curl", "-fsS", "http://localhost:9100/q/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  lore-app:
    restart: unless-stopped          # см. комментарий у minio
    build:
      context: .
      args:
        # Vite впекает эти значения в бандл на сборке — переменной окружения у
        # готового контейнера их не поменять, поэтому именно build-args.
        # Пусто → auth выключен, поведение как раньше. Флипать ВМЕСТЕ с
        # LORE_AUTH_ENABLED у бэкенда (docs/AUTH_OMILORE.md).
        VITE_LORE_AUTH_ENABLED: ${VITE_LORE_AUTH_ENABLED:-}
        VITE_OIDC_ISSUER: ${VITE_OIDC_ISSUER:-}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
    ports:
      - "4400:80"
    # host.docker.internal is auto-provided by Docker Desktop but NOT by plain
    # Docker Engine (Ubuntu) — map it to the host gateway so the /tyr-* proxy can
    # reach the host's TYR process there too. nginx no longer fails to boot when
    # this is unresolvable (deferred resolution in nginx.conf), so this only
    # affects whether TYR is reachable, never whether the app starts.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lore-backend:
        condition: service_healthy
    volumes:
      # См. комментарий выше — тот же случай зашитого Windows-пути.
      - ${TYR_RUNS_DIR:-./docs/tyr-runs}:/tyr-runs:ro

volumes:
  lore-minio-data:

