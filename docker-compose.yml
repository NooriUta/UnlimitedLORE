services:
  # Object storage for BRAGI asset uploads (images) — follows the naming
  # convention already agreed for Dali in DALI_FILE_UPLOAD_SPEC.md (Decision
  # #22), so a future Dali/Heimdall S3 rollout can reuse the same env-var
  # shape even though no service currently runs this in the monorepo.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-aida}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-aidapassword}
    volumes:
      - lore-minio-data:/data

  # Independent Quarkus backend — copied lore+bench logic, talks to the SAME
  # ArcadeDB (:2480 on the host) as the main project. Replaces heimdall-backend :9093.
  lore-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      # IPv4-only bind: Docker's bare "9100:9100" shorthand also publishes an
      # IPv6 [::]:9100 listener, and on this host `localhost` resolves to ::1
      # first — that IPv6 path hangs instead of connection-refusing, so any
      # client using bare "localhost" (curl, Node's fetch, the LORE MCP
      # server) stalls until timeout. Loopback-only matches the actual use
      # (host-side MCP server on the same machine) — same pattern minio's
      # 9001 console port already uses below.
      - "127.0.0.1:9100:9100"          # published so the host-side MCP server can reach it
    extra_hosts:
      - "arcade:host-gateway"          # ArcadeDB runs on the host :2480
      - "kc:host-gateway"              # Keycloak runs on the host :18180
    depends_on:
      - minio
    environment:
      - MART_ARCADE_URL=http://arcade:2480
      - ARCADEDB_USER=${ARCADEDB_USER:-root}
      - ARCADEDB_ROOT_PASSWORD=${ARCADEDB_ROOT_PASSWORD:-unset}
      # KC-мост (ADR-LORE-025 D11/D14): пусто → /lore/kc/* отвечает 503
      # "not configured", остальной LORE работает как обычно (pluggable).
      # Секрет читается через SecretProvider (D15): env | infisical.
      - KC_ADMIN_CLIENT_SECRET=${KC_ADMIN_CLIENT_SECRET:-}
      # НЕ ${KC_ADMIN_URL}: в .env он localhost (для host-скриптов), а внутри
      # контейнера localhost = сам контейнер. Ходим через kc:host-gateway.
      - kc.admin.url=http://kc:18180/kc
      - kc.admin.realm=${KC_ADMIN_REALM:-omilore}
      - lore.secrets.provider=${LORE_SECRETS_PROVIDER:-env}
      - BENCH_ROOT=/bench-data
      - TEAM_DOCS_ROOT=/team-docs
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-bragi-assets}
      - S3_ACCESS_KEY=${MINIO_USER:-aida}
      - S3_SECRET_KEY=${MINIO_PASSWORD:-aidapassword}
      - S3_REGION=us-east-1
    volumes:
      - C:/AIDA/rag-vs-parse:/bench-data:ro   # STATUS.json + report html
      - C:/AIDA/docs:/team-docs:ro            # ingestion source (opt-in)
    healthcheck:
      # Liveness (process up), not readiness — so an ArcadeDB blip doesn't flap
      # the container. Readiness (DB-gated) lives at /q/health/ready for monitoring.
      test: ["CMD", "curl", "-fsS", "http://localhost:9100/q/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  lore-app:
    build: .
    ports:
      - "4400:80"
    # host.docker.internal is auto-provided by Docker Desktop but NOT by plain
    # Docker Engine (Ubuntu) — map it to the host gateway so the /tyr-* proxy can
    # reach the host's TYR process there too. nginx no longer fails to boot when
    # this is unresolvable (deferred resolution in nginx.conf), so this only
    # affects whether TYR is reachable, never whether the app starts.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lore-backend:
        condition: service_healthy
    volumes:
      - C:/AIDA/TestPlayGround/runs:/tyr-runs:ro

volumes:
  lore-minio-data:

