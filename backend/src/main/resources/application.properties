# ── Server ────────────────────────────────────────────────────────────────────
# Own port — NOT 9093 (that is the main project's heimdall-backend; 9093/9095 busy).
quarkus.http.port=9100
quarkus.http.host=0.0.0.0
quarkus.application.name=lore-backend
quarkus.analytics.disabled=true

# ── ArcadeDB — same instance as the main project (:2480) ──────────────────────
# Inside Docker pass MART_ARCADE_URL=http://arcade:2480 (host-gateway alias).
quarkus.rest-client.mart-api.url=${MART_ARCADE_URL:http://localhost:2480}
quarkus.rest-client.mart-api.scope=Singleton

# ── LORE — full logic (serving + ingestion) ──────────────────────────────────
lore.enabled=true
lore.db=system_aida_lore
# Bootstrap (schema DDL + component seed) runs on startup ONLY when true. Default
# false: we share system_aida_lore with the main project, so we never re-seed the
# shared DB on boot. Flip to true only when targeting a fresh ArcadeDB.
lore.bootstrap=${LORE_BOOTSTRAP:false}
# Source repo for the ingestion pipeline (parsers → ArcadeDB). Opt-in via admin endpoint.
team-docs.root=${TEAM_DOCS_ROOT:C:/AIDA/docs}

# ── BENCH — experiment mart + file server ────────────────────────────────────
bench.mart.enabled=true
bench.mart.db=RAGVSDL
bench.mart.user=${ARCADEDB_USER:root}
bench.mart.password=${ARCADEDB_ROOT_PASSWORD:unset}
# STATUS.json + static report docs/RAG_VS_PARSE_EXPERIMENT.html live here.
bench.root=${BENCH_ROOT:C:/AIDA/rag-vs-parse}

# ── CORS — frontend is same-origin via nginx/vite proxy; allow direct dev access
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4400,http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User

# ── S3 (MinIO) — BRAGI asset uploads (SPEC-BRAGI-ARCHIVE-001) ────────────────
bragi.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
bragi.s3.bucket=${S3_BUCKET:bragi-assets}
bragi.s3.access-key=${S3_ACCESS_KEY:aida}
bragi.s3.secret-key=${S3_SECRET_KEY:aidapassword}
bragi.s3.region=${S3_REGION:us-east-1}

# ── Observability ─────────────────────────────────────────────────────────────
# /q/health — smallrye-health incl. ArcadeReadinessCheck (readiness gated on ArcadeDB).
# /q/metrics — Prometheus scrape (micrometer). Both are the endpoints the compose
# healthcheck and any orchestrator/monitoring should target.
quarkus.micrometer.export.prometheus.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
# studio.seer is verbose (DEBUG) only in dev; INFO in prod so logs stay signal.
quarkus.log.category."studio.seer".level=INFO
%dev.quarkus.log.category."studio.seer".level=DEBUG
# Structured JSON console logs in prod (quarkus-logging-json); human-readable in dev/test.
quarkus.log.console.json.enabled=true
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
