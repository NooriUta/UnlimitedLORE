# ── Server ────────────────────────────────────────────────────────────────────
# Own port — NOT 9093 (that is the main project's heimdall-backend; 9093/9095 busy).
quarkus.http.port=9100
quarkus.http.host=0.0.0.0
quarkus.application.name=lore-backend
quarkus.analytics.disabled=true

# ── ArcadeDB — same instance as the main project (:2480) ──────────────────────
# Inside Docker pass MART_ARCADE_URL=http://arcade:2480 (host-gateway alias).
quarkus.rest-client.mart-api.url=${MART_ARCADE_URL:http://localhost:2480}
quarkus.rest-client.mart-api.scope=Singleton

# ── LORE — full logic (serving + ingestion) ──────────────────────────────────
lore.enabled=true
lore.db=system_aida_lore
# Bootstrap (schema DDL + component seed) runs on startup ONLY when true. Default
# false: we share system_aida_lore with the main project, so we never re-seed the
# shared DB on boot. Flip to true only when targeting a fresh ArcadeDB.
lore.bootstrap=${LORE_BOOTSTRAP:false}
# Source repo for the ingestion pipeline (parsers → ArcadeDB). Opt-in via admin endpoint.
team-docs.root=${TEAM_DOCS_ROOT:C:/AIDA/docs}

# ── BENCH — experiment mart + file server ────────────────────────────────────
bench.mart.enabled=true
bench.mart.db=RAGVSDL
bench.mart.user=${ARCADEDB_USER:root}
bench.mart.password=${ARCADEDB_ROOT_PASSWORD:unset}
# STATUS.json + static report docs/RAG_VS_PARSE_EXPERIMENT.html live here.
bench.root=${BENCH_ROOT:C:/AIDA/rag-vs-parse}

# ── CORS — frontend is same-origin via nginx/vite proxy; allow direct dev access.
# NOTE: browsers send Origin on POST even same-origin, so any serving origin that
# does UI writes MUST be listed here or the write is 403'd at the CORS layer
# (F-23). Set CORS_ORIGINS in prod/staging to the real domain(s). 5173/5190 = vite dev.
# 127.0.0.1 variants listed too: Quarkus matches Origin literally, so a UI opened
# via 127.0.0.1 instead of localhost otherwise gets empty-body "403 CORS Rejected"
# on every write while reads keep working (2026-07-13 incident, ADR editor).
#
# ТОТ ЖЕ ОТКАЗ ПОВТОРИЛСЯ ПОСЛЕ ПЕРЕЕЗДА НА ci-server (2026-07-18). Пока стенд жил
# на ноуте, его открывали как localhost:4400 — список сходился сам собой. На
# сервере адрес стал 192.168.3.131:4400, в списке его нет, и запись отвалилась,
# а чтение продолжало работать: браузер не шлёт Origin на GET. Симптом — «UI
# открывается, кнопки не работают» — на CORS не похож вообще.
#
# Дефолт ниже поэтому включает и адрес стенда, и имя lore.odal: перечислять
# СЕРВИРУЮЩИЕ адреса надо заранее, а не после того, как запись отвалилась.
# Порт обязателен — Quarkus сравнивает Origin буквально, без него не совпадёт.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4400,http://localhost:5173,http://localhost:5190,http://127.0.0.1:4400,http://127.0.0.1:5173,http://127.0.0.1:5190,http://192.168.3.131:4400,http://lore.odal.seidrstudio.pro:4400,https://lore.odal.seidrstudio.pro}
quarkus.http.cors.methods=GET,POST,PUT,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Seer-Role,X-Seer-User

# ── S3 (MinIO) — BRAGI asset uploads (SPEC-BRAGI-ARCHIVE-001) ────────────────
bragi.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
bragi.s3.bucket=${S3_BUCKET:bragi-assets}
bragi.s3.access-key=${S3_ACCESS_KEY:aida}
bragi.s3.secret-key=${S3_SECRET_KEY:aidapassword}
bragi.s3.region=${S3_REGION:us-east-1}

# ── Observability ─────────────────────────────────────────────────────────────
# /q/health — smallrye-health incl. ArcadeReadinessCheck (readiness gated on ArcadeDB).
# /q/metrics — Prometheus scrape (micrometer). Both are the endpoints the compose
# healthcheck and any orchestrator/monitoring should target.
quarkus.micrometer.export.prometheus.enabled=true

# ── Auth — Keycloak omilore realm (A2) ────────────────────────────────────────
# DISABLED by default so dev/local runs without KC (X-Seer-Role header trusted as
# today). Enable in staging/prod: LORE_AUTH_ENABLED=true + LORE_OIDC_ISSUER set to
# the omilore realm. When enabled, SeerRoleFromTokenFilter overwrites X-Seer-Role
# from the verified token's realm roles (admin/super-admin) — header spoofing no
# longer works. Import backend/keycloak/omilore-realm.json into the shared KC first.
quarkus.oidc.enabled=${LORE_AUTH_ENABLED:false}
quarkus.oidc.auth-server-url=${LORE_OIDC_ISSUER:http://localhost:18180/kc/realms/omilore}
quarkus.oidc.application-type=service
# Issuer validation is Quarkus's default (must match auth-server-url above) —
# do NOT set quarkus.oidc.token.issuer=any, that accepts tokens from ANY OIDC
# provider, not just this realm (flagged by Devin review on PR #79, SEC-0002).
# realm roles arrive in the "seer_roles" claim (mirrors the platform seer realm mapper)
quarkus.oidc.roles.role-claim-path=seer_roles

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
# studio.seer is verbose (DEBUG) only in dev; INFO in prod so logs stay signal.
quarkus.log.category."studio.seer".level=INFO
%dev.quarkus.log.category."studio.seer".level=DEBUG
# Structured JSON console logs in prod (quarkus-logging-json); human-readable in dev/test.
quarkus.log.console.json.enabled=true
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
# PL-09: quarkus-logging-json's structured stack-trace formatter (exception-output-type
# "detailed", the default) throws NPE inside addStackTraceElements/startObject on certain
# frames (seen twice this session masking real startup errors as FORMAT_FAILURE — the
# actual cause only surfaced via `docker logs` grep, not the log line itself). "formatted"
# renders the stack trace as one plain string field instead of a structured array, which
# sidesteps that code path entirely — still valid JSON, still fully readable, just not
# per-frame-structured. Trade a rarely-used structured field for logs that never eat errors.
quarkus.log.console.json.exception-output-type=formatted
