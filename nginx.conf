server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never emit absolute redirects that bake in the container's :80 (would strip
    # the host's :4400 from the browser URL).
    absolute_redirect off;
    port_in_redirect off;

    # Docker's embedded DNS. Needed so the TYR proxy blocks below can resolve
    # their upstream at REQUEST time (via a variable in proxy_pass) instead of at
    # config-load time. A literal proxy_pass host is resolved when nginx starts,
    # so an absent host (e.g. host.docker.internal on plain Docker Engine / no TYR
    # running) makes nginx fail with `[emerg] host not found in upstream` and the
    # WHOLE app never boots. Deferred resolution degrades a missing TYR to a 502
    # on /tyr-* only, leaving /lore, /bench and the SPA fully working.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml image/svg+xml;

    # ── Security headers (server-level defaults) ──────────────────────────────
    # NOTE: nginx does NOT inherit add_header into a location that sets its own
    # add_header, so the two Cache-Control locations below repeat this set.
    # CSP is intentionally permissive for now: the app relies on inline styles
    # (1643 style={{}}), mermaid uses new Function (unsafe-eval), Monaco runs
    # workers from blob:. Tighten once inline styles are migrated (task B6).
    #
    # Keycloak (odal.seidrstudio.pro) внесён в connect-src И frame-src, потому
    # что он живёт на ДРУГОМ origin, а не путём на этом. Оба нужны и по разным
    # причинам: connect-src — обмен кода на токен и jwks; frame-src — скрытый
    # iframe тихого обновления (oidc-client-ts, automaticSilentRenew: true).
    # Забыть frame-src особенно неприятно: логин пройдёт, а сессия начнёт молча
    # отваливаться через несколько минут, и причина будет выглядеть как угодно,
    # только не как CSP.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://odal.seidrstudio.pro; frame-src 'self' https://odal.seidrstudio.pro; frame-ancestors 'self'; base-uri 'self'" always;

    # Trailing slash is deliberate: a bare `location /bench` prefix would also
    # match the SPA route `/benchmark` (and `/lore` would match a hard-reload of
    # the `/lore` page). API calls all hit `/lore/…` and `/bench/…`, so the
    # trailing-slash prefixes proxy the API while SPA paths fall through to `/`.
    # Exact match wins over the `/lore/` prefix below, so the bare SPA route
    # `/lore` serves index.html instead of nginx auto-301'ing it to `/lore/`
    # (which would hit the proxy and loop). API calls are always `/lore/<slice>`.
    location = /lore {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://odal.seidrstudio.pro; frame-src 'self' https://odal.seidrstudio.pro; frame-ancestors 'self'; base-uri 'self'" always;
        try_files /index.html =404;
    }

    # index.html itself must never be cached — it's what pins the browser to a
    # JS/CSS bundle by hashed filename. Without this, a stale cached index.html
    # after a redeploy keeps serving the OLD hashed bundle names indefinitely
    # (this bit a feature-toolbar check right after a same-day deploy — the
    # container was current, the browser's cached entry point wasn't).
    # Hashed assets under /assets/ are safe to cache forever since a content
    # change always produces a new filename.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://odal.seidrstudio.pro; frame-src 'self' https://odal.seidrstudio.pro; frame-ancestors 'self'; base-uri 'self'" always;
    }

    location /lore/ {
        proxy_pass http://lore-backend:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /bench/ {
        proxy_pass http://lore-backend:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # TYR — Playwright test runner API (optional host process on :9300).
    # Upstream via a $variable so nginx resolves it per-request (see resolver
    # above): if TYR isn't running / host.docker.internal isn't mapped, this
    # 502s instead of blocking nginx startup. `rewrite` reproduces the URI
    # mapping that a literal `proxy_pass …/api/` used to do (variable proxy_pass
    # doesn't rewrite the location prefix automatically).
    location /tyr-api/ {
        set $tyr_upstream host.docker.internal:9300;
        rewrite ^/tyr-api/(.*)$ /api/$1 break;
        proxy_pass http://$tyr_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # TYR — WebSocket for live run logs (optional host process on :9300)
    location /tyr-ws {
        set $tyr_upstream host.docker.internal:9300;
        rewrite ^/tyr-ws(.*)$ /ws$1 break;
        proxy_pass http://$tyr_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Allure reports — served directly from the volume mounted at /tyr-runs
    location /tyr-runs/ {
        root /;
        try_files $uri =404;
    }

    # SPA fallback. No `$uri/` — a directory probe on the `/lore` route would
    # internal-redirect to `/lore/`, collide with the proxy block above, and
    # bounce the browser off-port. SPA paths never need directory resolution.
    location / {
        try_files $uri /index.html;
    }
}
