name: LORE Release (publish on tag)

# Публикация Release по пушу тега.
#
# Зачем понадобилось. Теги v1.0.50…v1.0.54 были запушены, а объектов Release для
# них не создано — список опубликованных обрывался на v1.0.49. Витрина при этом
# писала «97 коммитов develop с этого выпуска», то есть показывала состояние
# двухдневной давности при сделанной и оттегированной работе (MIG-26).
#
# Автоматизации не существовало НИКОГДА: до переезда стенд жил на ноутбуке,
# релизы публиковались руками, и это было нормально. С появлением сервера и
# раннеров ручной шаг стал единственным, который никто не выполняет.
#
# Тег — и есть событие релиза, поэтому триггер по тегу, а не по ветке: релизы
# режутся на develop, и привязка к ветке ничего бы не дала.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # нужно для создания Release

concurrency:
  group: lore-release-${{ github.ref }}
  cancel-in-progress: false   # публикация не гонка — очередь, а не отмена

jobs:
  publish:
    name: Publish Forgejo release from RELEASE-<tag>.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Publish
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          TAG="${GITHUB_REF#refs/tags/}"
          FILE="RELEASE-${TAG}.md"

          # Адрес API — тот же, по которому в этом же job'е ходит actions/checkout
          # (http://forgejo:3000). Публичное имя из github.server_url изнутри
          # раннера может не резолвиться: раннер живёт в сети forgejo-net.
          API="http://forgejo:3000/api/v1/repos/${GITHUB_REPOSITORY}"

          # ТЕЛО ОБЯЗАТЕЛЬНО. Пустой релиз хуже отсутствующего: он выглядит
          # опубликованным, и пропажу описания замечают через недели. Тот же
          # принцип, что в lore-cd.yml — проверять факт, а не код возврата.
          if [ ! -f "$FILE" ]; then
            echo "::error::нет $FILE — релиз $TAG не публикуется. Опишите релиз в этом файле и перезапустите: пустое тело выглядит опубликованным и прячет пропажу."
            exit 1
          fi

          # Идемпотентность: тег могли перезапушить, а workflow — перезапустить
          # вручную. Существующий релиз НЕ трогаем: тело могли отредактировать
          # руками, и повторная запись затёрла бы правку.
          code=$(curl -s -o /tmp/existing.json -w '%{http_code}' \
            -H "Authorization: token $TOKEN" "$API/releases/tags/$TAG")
          if [ "$code" = "200" ]; then
            echo "релиз $TAG уже опубликован — ничего не меняю"
            exit 0
          fi

          # Первая строка файла — заголовок релиза, остальное — тело.
          TITLE=$(head -1 "$FILE" | sed 's/^#\+[[:space:]]*//')
          [ -z "$TITLE" ] && TITLE="$TAG"

          # jq собирает JSON сам: тело — многострочный markdown с кавычками и
          # обратными слэшами, ручная сборка строки его бы поломала.
          jq -n --arg tag "$TAG" --arg name "$TITLE" --rawfile body "$FILE" \
            '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}' \
            > /tmp/release.json

          code=$(curl -s -o /tmp/created.json -w '%{http_code}' -X POST \
            -H "Authorization: token $TOKEN" -H 'Content-Type: application/json' \
            --data-binary @/tmp/release.json "$API/releases")

          if [ "$code" != "201" ]; then
            echo "::error::создание релиза $TAG вернуло HTTP $code"
            head -c 500 /tmp/created.json
            exit 1
          fi
          echo "релиз $TAG опубликован: $TITLE"

      # ── Зеркало GitHub ────────────────────────────────────────────────────
      # Последнее звено цепочки develop → preprod → main (tag) → mirror.
      #
      # Forgejo — источник истины и место CI/CD; GitHub остаётся ЗЕРКАЛОМ
      # РЕЛИЗОВ (Actions там отключены — аккаунт в billing-локе, прогоны не
      # запускаются вовсе). Поэтому льём только релизное: ветку main и сам тег,
      # а не ветки разработки — иначе зеркало копило бы dev-шум, ради которого
      # оно не заводилось.
      #
      # Раньше этого шага не было совсем: теги и main уезжали в GitHub руками,
      # и зеркало регулярно отставало (проверено 2026-07-16 — объекты Release
      # обрывались на v1.0.45 при существующих тегах до v1.0.49).
      #
      # Токен НЕ обязателен: без него шаг честно предупреждает и выходит, а не
      # роняет уже опубликованный релиз. Красный релиз из-за недоступного
      # зеркала — худший обмен, чем отставшее зеркало, о котором сказано вслух.
      - name: Mirror main + tag to GitHub
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
          GH_REPO: ${{ secrets.GH_MIRROR_REPO }}   # напр. NooriUta/UnlimitedLORE
        run: |
          set -u
          TAG="${GITHUB_REF#refs/tags/}"

          if [ -z "${GH_TOKEN:-}" ] || [ -z "${GH_REPO:-}" ]; then
            echo "::warning::зеркало GitHub пропущено — не заданы GH_MIRROR_TOKEN/GH_MIRROR_REPO (Forgejo: Settings -> Actions -> Secrets). Тег $TAG останется только в Forgejo."
            exit 0
          fi

          # Полная история нужна для push ветки: checkout по умолчанию мелкий,
          # и GitHub отверг бы неполный набор объектов.
          git fetch --unshallow origin 2>/dev/null || git fetch --prune origin
          git fetch origin main:refs/remotes/origin/main --force

          # Тег обязан быть В main: зеркало отражает релизы, а не произвольные
          # точки. Тег мимо main означает, что релиз срезан не оттуда — это
          # ошибка процесса, и молча зеркалить её нельзя.
          if ! git merge-base --is-ancestor "refs/tags/$TAG" origin/main; then
            echo "::warning::тег $TAG не содержится в main — зеркалирование пропущено. Сначала влейте preprod в main, потом ставьте тег."
            exit 0
          fi

          git push "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" \
            "refs/remotes/origin/main:refs/heads/main" "refs/tags/$TAG"
          echo "зеркало обновлено: main + $TAG -> github.com/${GH_REPO}"
