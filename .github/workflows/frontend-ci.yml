name: Frontend + MCP CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: LORE frontend — install + typecheck + build
        run: |
          npm ci
          npm run build

      - name: MCP server — install + typecheck + build
        working-directory: mcp-server
        run: |
          npm ci
          npm run build
