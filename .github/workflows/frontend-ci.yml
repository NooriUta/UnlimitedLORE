name: Frontend + MCP CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Раннер получает HTTP_PROXY из своей конфигурации, и она переезжает вместе
      # с ним. После переноса раннеров на ci-server прокси остался прописанным
      # (…:10809), но там его нет — setup-node падал за 0 секунд с
      # «tunneling socket could not be established, ECONNREFUSED 172.17.0.1:10809»,
      # и красным был ЛЮБОЙ PR, независимо от содержимого.
      #
      # Не «убрать прокси», а не зависеть от того, жив ли он: проверяем
      # доступность и, если не отвечает, снимаем переменные на остаток job'а.
      # Так один и тот же workflow работает и с прокси, и без него.
      #
      # ПРОКСИ НУЖЕН, а не «желателен» — снимать его из конфигурации раннера
      # нельзя. Прямой выход у ci-server есть, но деградирован: 20 пакетов через
      # прокси — 20 секунд, напрямую — 2 мин 55 с, а `apk add curl` напрямую
      # вообще отваливается по таймауту. Ускоряет при этом не VPN (npm по
      # правилам маршрутизации идёт мимо него, direct), а сам xray —
      # переиспользованием соединений. Тем же прокси ходит Telegram-уведомление
      # из lore-cd.yml.
      #
      # ПРОВЕРКА ИМЕННО TCP-КОННЕКТОМ, И ЭТО НАМЕРЕННО. Не заменять на HTTP-пробу
      # через busybox wget: он получает через этот прокси 400 Bad Request (curl и
      # npm при этом работают), и такая проба ложно объявила бы живой прокси
      # мёртвым — переменные снялись бы, npm ушёл бы напрямую и job умер бы по
      # таймауту, причём с невнятной ошибкой npm вместо внятной причины.
      - name: Resolve a working proxy address (or drop it)
        run: bash .github/scripts/resolve-proxy.sh

      # npm через зеркало в локальной сети. Прямой реестр на этом канале не
      # доживает до конца установки:
      #
      #   npm error code EIDLETIMEOUT
      #   npm error Idle timeout reached for host `registry.npmjs.org:443`
      #
      # `npm ci` берёт адреса из package-lock.json, и смена реестра сама по себе
      # могла бы не подействовать — но npm с 9-й версии подменяет хост у
      # npmjs-ссылок (`replace-registry-host=npmjs`, на раннере npm 11). Значит
      # lock-файл пересоздавать не нужно и он остаётся пригодным вне этой сети.
      #
      # Если Nexus недоступен, скрипт молча ничего не меняет — установка идёт
      # напрямую, как раньше.
      # ВРЕМЕННО ОТКЛЮЧЕНО — Nexus донастраивают, см. коммит.
      # - name: Use Nexus mirror
      #   run: bash .github/scripts/use-nexus.sh

      - name: Set up Node.js (github-hosted)
        if: runner.environment == 'github-hosted'
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      # Self-hosted стенд: образ раннера УЖЕ несёт Node нужной версии, но
      # setup-node этого не видит и качает дистрибутив с GitHub. На этом канале
      # загрузка обрывается:
      #
      #   Acquiring 24.18.0 - x64 from https://github.com/actions/node-versions/...
      #   aborted
      #   Waiting 20 seconds before trying again
      #
      # Пять минут ожидания и красный прогон — при том, что ровно эта версия
      # лежит в образе. Проверено: `node --version` в forgejo-ci-runtime:jdk21
      # отдаёт v24.18.0, то есть ту же, что скачивалась.
      #
      # Зеркальный случай уже был у бэкенда с JDK и лечился так же — брать из
      # образа вместо загрузки. Здесь просто не заметили, потому что фронт падал
      # реже: у setup-node есть собственный повтор, и он иногда спасал.
      #
      # Кэш npm тут не настраивается намеренно: его включал `cache: 'npm'` у
      # setup-node, а без действия настраивать нечем. Потеря невелика — npm
      # ходит в реестр, который после появления зеркала Nexus станет локальным.
      - name: Use runner-image Node (self-hosted)
        if: runner.environment != 'github-hosted'
        run: |
          command -v node >/dev/null || { echo "::error::в образе раннера нет node"; exit 1; }
          echo "node $(node --version), npm $(npm --version) — из образа, без загрузки"

      - name: LORE frontend — install + typecheck + test + build
        run: |
          npm ci
          npm run check:statuses
          npm run lint
          npm test
          npm run build

      - name: MCP server — install + typecheck + test + build
        working-directory: mcp-server
        run: |
          npm ci
          npm test
          npm run build

      # Validates the frontend Dockerfile (npm build + nginx.conf) as shipped.
      # Внутри образа идёт `npm ci`, а прямой выход у ci-server деградирован
      # (см. комментарий к шагу отсечения прокси выше) — без прокси эта сборка
      # либо тянется минутами, либо падает по таймауту. Прокси у раннера задан
      # как host.docker.internal, а внутри docker build это имя само НЕ
      # резолвится на Linux-демоне: нужен --add-host, иначе build-arg указывает
      # в никуда. Та же правка, что в backend-ci.yml.
      - name: Docker image build (frontend + nginx)
        run: |
          ARGS="--add-host=host.docker.internal:host-gateway"
          for v in HTTP_PROXY HTTPS_PROXY NO_PROXY http_proxy https_proxy no_proxy; do
            eval "val=\${$v:-}"
            [ -n "$val" ] && ARGS="$ARGS --build-arg $v=$val"
          done
          # shellcheck disable=SC2086
          docker build $ARGS -t lore-app:ci .
