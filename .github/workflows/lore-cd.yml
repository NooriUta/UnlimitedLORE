name: LORE CD (ci-server stand)

# Continuous deployment to the docker-compose stand on ci-server (lore-backend
# :9100 / lore-app :4400). До 2026-07-18 это был стенд на ноуте разработчика —
# отсюда «local» в прежнем названии и упоминания Docker Desktop ниже. После
# переезда БД, Keycloak, Forgejo и самого стенда на ci-server workflow не
# пережил смену топологии сразу по трём причинам, и все три чинятся тут:
# windows-пути томов (валидны на ноуте, отвергаются Linux-демоном), пустые
# секреты мостов и имя compose-проекта, выведенное из каталога раннера.
# Deliberately
# NOT modeled on aida-root's cd.yml (tag-triggered, SSH-to-remote-host, backup/
# rollback, Telegram) — there is no remote staging/prod target here, just this
# machine's Docker Desktop. Borrowed from that pattern: workflow_dispatch for an
# on-demand run, a concurrency group so two deploys never race, and a real
# post-deploy health check instead of trusting `docker compose up` succeeding.
#
# Runs via the Forgejo act_runner registered on THIS host (label "ubuntu-latest",
# see the job's runs-on comment) — a github-hosted runner has no access to this
# machine's Docker Desktop / compose stack at all, so this only makes sense here.

on:
  push:
    branches: ["develop"]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to redeploy'
        required: false
        default: 'both'
        type: choice
        options: [both, backend, frontend]

concurrency:
  group: lore-cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deploy in flight — queue instead

permissions:
  contents: read

jobs:
  deploy:
    name: Build + deploy to local Docker stand
    # Matches backend-ci.yml: the only registered runner label is "ubuntu-latest"
    # (mapped by the runner's own config to the forgejo-ci-runtime:jdk21 image),
    # NOT "self-hosted" — that label doesn't exist here and the job would queue
    # forever. github-hosted runners can't reach this host's Docker Desktop at
    # all, so this workflow only makes sense running here regardless of the label name.
    runs-on: ubuntu-latest
    # This job's checkout has no .env (gitignored — it holds the ArcadeDB root
    # password). docker-compose.yml reads ARCADEDB_ROOT_PASSWORD from the shell
    # environment (which wins over any .env), so pass it here from a repo
    # secret. Found the hard way on 2026-07-13: without this, compose silently
    # falls back to the literal placeholder "unset", the backend authenticates
    # to ArcadeDB (:2480) as root/unset, and every query 403s — while the
    # container itself stays "healthy" the whole time, so this workflow's own
    # health check didn't catch it.
    env:
      ARCADEDB_ROOT_PASSWORD: ${{ secrets.ARCADEDB_ROOT_PASSWORD }}
      # Секреты мостов НЕ передаются сюда по одному — вместо них учётка
      # Infisical, а KC_ADMIN_CLIENT_SECRET/FORGEJO_API_TOKEN бэкенд забирает
      # оттуда сам (SecretProvider, D15). Так в Forgejo лежит бутстрап, а не
      # живые секреты, и ротация делается в одном месте.
      #
      # Почему это вообще понадобилось: у job'а нет .env (gitignored), поэтому
      # без явной передачи деплой поднимал бы бэкенд с ПУСТЫМИ секретами — оба
      # моста молча уходили бы в 503 «not configured» при зелёном деплое.
      LORE_SECRETS_PROVIDER: infisical
      LORE_SECRETS_URL: http://infisical:18080
      LORE_SECRETS_CLIENT_ID: ${{ secrets.LORE_SECRETS_CLIENT_ID }}
      LORE_SECRETS_CLIENT_SECRET: ${{ secrets.LORE_SECRETS_CLIENT_SECRET }}
      LORE_SECRETS_PROJECT_ID: ${{ secrets.LORE_SECRETS_PROJECT_ID }}
      LORE_SECRETS_ENVIRONMENT: prod
      LORE_SECRETS_SCOPE: /
      # Стенд переехал на ci-server: ArcadeDB, Keycloak, Forgejo и Infisical
      # живут на ТОМ ЖЕ хосте, поэтому host-gateway (дефолт compose) верен для
      # всех четырёх и переопределять их здесь не нужно.
      #
      # Имя compose-проекта прибито ЯВНО. Иначе оно выводится из каталога
      # checkout'а раннера, и деплой создал бы ВТОРОЙ параллельный стенд: он
      # либо упёрся бы в занятый порт 4400, либо развёл два набора контейнеров
      # и named-volume minio. Живой стенд поднят как проект `unlimitedlore` —
      # под этим именем его и обновляем.
      COMPOSE_PROJECT_NAME: unlimitedlore
      # ── Аутентификация (RUNBOOK-AUTH-OMILORE) ────────────────────────────
      # ВСЕ пять флипаются вместе. Включённый фронт при выключенном бэкенде шлёт
      # токен, который никто не проверяет; обратное — бэкенд требует токен,
      # которого фронт не присылает.
      #
      # Обе стороны BUILD-TIME, и по разным причинам: Vite впекает import.meta.env
      # в бандл, а quarkus.oidc.enabled фиксируется на сборке. Поэтому значения
      # уходят в build-args (см. compose), а не только в окружение контейнера —
      # иначе флаг «не срабатывает» без единой ошибки в логах.
      #
      # Issuer — ПУБЛИЧНЫЙ адрес KC: на него редиректит браузер, и по нему же
      # бэкенд забирает JWKS (проверено из контейнера: 200).
      LORE_AUTH_ENABLED: "true"
      LORE_OIDC_ISSUER: https://odal.seidrstudio.pro/kc/realms/omilore
      VITE_LORE_AUTH_ENABLED: "true"
      VITE_OIDC_ISSUER: https://odal.seidrstudio.pro/kc/realms/omilore
      VITE_OIDC_CLIENT_ID: lore-app
      # ── HTTPS на LAN ─────────────────────────────────────────────────────
      # Оверлей подключается ТОЛЬКО здесь, а не в основном compose: сеть
      # `headscale-net` существует лишь на ci-server, и объявление её в
      # docker-compose.yml сломало бы `docker compose up` где угодно ещё —
      # сети нет, стенд не поднимается.
      #
      # HTTPS тут не про «выставить наружу»: вход по OIDC физически невозможен
      # на http://192.168.3.131:4400, потому что `crypto.subtle` (нужен
      # oidc-client-ts для PKCE) существует только в защищённом контексте.
      # На ноуте адрес был localhost — единственное исключение спецификации, и
      # переезд молча отобрал криптографию вместе со сменой адреса.
      # Оверлей ОБЯЗАТЕЛЕН, пока auth включён: без него стенд отдаётся только по
      # :4400, а на этом адресе вход невозможен в принципе — нет защищённого
      # контекста. Отключение оверлея равносильно «UI недоступен с любой машины,
      # кроме самого сервера», и это не очевидно из самого факта отключения.
      #
      # Проверялось вечером 19.07: с выключенным оверлеем стенд отвечал 200 по
      # :4400 и выглядел рабочим, но получить сессию было неоткуда.
      COMPOSE_FILE: docker-compose.yml:docker-compose.traefik.yml
      # ── Зеркало Nexus для Gradle внутри сборки образа ─────────────────────
      # Адрес именно LAN-ый, а не host.docker.internal: на Linux-демоне это имя
      # само не резолвится, и build-arg указывал бы в пустоту — ровно та
      # ошибка, что уже стоила отказа с прокси.
      #
      # Если Nexus недоступен, сборка не падает: публичные репозитории остаются
      # в списке вторыми (см. Dockerfile.local).
      # ВРЕМЕННО ПУСТО. Nexus донастраивают, и в этот период он отдаёт 404 на
      # артефакты, которых ещё не закэшировал. Для Gradle это хуже, чем кажется:
      # запасной публичный репозиторий спасает только на этапе МЕТАДАННЫХ.
      # Gradle запоминает, откуда пришёл .pom, и за .jar идёт туда же — если
      # зеркало отдало pom, но не отдало jar, повторного поиска не будет:
      #
      #   Could not find jandex-3.5.3.jar
      #     Searched in the following locations:
      #         http://192.168.3.131:8081/repository/maven-central-proxy/...
      #
      # Публичных репозиториев в списке нет вовсе. Вернуть адреса, когда Nexus
      # устоится, — механизм рабочий и остаётся на месте.
      LORE_MAVEN_MIRROR: ""
      LORE_PLUGIN_MIRROR: ""
    steps:
      - uses: actions/checkout@v7

      - name: Verify required secrets are configured
        run: |
          # Учётка Infisical проверяется ЗДЕСЬ, а не «по факту работы»: без неё
          # деплой проходит зелёным, а /lore/kc/* и /lore/forgejo/* отвечают
          # 503. Это ровно тот класс отказов, который уже прятался за успешным
          # деплоем (см. историю с ARCADEDB_ROOT_PASSWORD ниже) — падаем сразу.
          missing=""
          for v in LORE_SECRETS_CLIENT_ID LORE_SECRETS_CLIENT_SECRET LORE_SECRETS_PROJECT_ID; do
            eval "val=\${$v:-}"
            [ -z "$val" ] && missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error::не заданы секреты:$missing. Добавьте в Forgejo: Settings -> Actions -> Secrets. Это machine identity Infisical (org -> Access Control -> Identities -> Universal Auth), из неё бэкенд берёт KC_ADMIN_CLIENT_SECRET и FORGEJO_API_TOKEN."
            exit 1
          fi
          if [ -z "${ARCADEDB_ROOT_PASSWORD}" ]; then
            echo "::error::secrets.ARCADEDB_ROOT_PASSWORD is not set on this repo — deploy would silently break the backend's ArcadeDB auth (see comment above). Add it in Forgejo: Settings -> Actions -> Secrets."
            exit 1
          fi

      - name: Resolve which services to touch
        id: which
        run: |
          svc="${{ github.event.inputs.service || 'both' }}"
          echo "backend=$([ "$svc" != frontend ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "frontend=$([ "$svc" != backend ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # Диагностика доставки флага (AL-53) — почему auth не включается, хотя
      # флаги стоят в env выше. Логика в скрипте, а не здесь: bash внутри `run:`
      # дважды ломал разбор workflow парсером Forgejo (см. resolve-proxy.sh).
      - name: Что compose реально подставит в build-args
        run: bash .github/scripts/build-args-probe.sh

      - name: Build backend image
        if: steps.which.outputs.backend == 'true'
        run: bash .github/scripts/compose-build-retry.sh lore-backend

      - name: Build frontend image
        if: steps.which.outputs.frontend == 'true'
        run: bash .github/scripts/compose-build-retry.sh lore-app

      - name: Deploy backend
        if: steps.which.outputs.backend == 'true'
        run: docker compose up -d --no-deps lore-backend

      - name: Deploy frontend
        if: steps.which.outputs.frontend == 'true'
        run: docker compose up -d --no-deps lore-app

      # Real verification, not "the command exited 0" — matches the manual
      # check this session ran by hand after every deploy this sprint.
      #
      # NOT curl 127.0.0.1:PORT from this step: this job runs inside a runner
      # container on the isolated "forgejo-net" bridge network (DooD via a
      # socket mount, not host networking) — its own 127.0.0.1 is itself, not
      # the Docker host, so a direct curl here would silently hit nothing.
      # `docker inspect`/`docker exec` go through the mounted socket instead,
      # which reaches the actual containers regardless of network topology.
      #
      # Resolved via `docker compose ps -q`, not a hardcoded container name —
      # the compose project name is derived from the checkout directory, which
      # may not be "unlimitedlore" on the runner's workspace.
      - name: Wait for backend health
        if: steps.which.outputs.backend == 'true'
        run: |
          cid=$(docker compose ps -q lore-backend)
          for i in $(seq 1 24); do
            status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "healthy" ]; then echo "backend healthy"; exit 0; fi
            sleep 5
          done
          echo "::error::backend did not report healthy within 120s (last status: $status)"
          exit 1

      # «Контейнер healthy» не значит «мосты настроены»: healthcheck смотрит
      # только /q/health/live. Пустой секрет даёт живой контейнер и мёртвый
      # KC-мост — именно так выглядел бы зелёный деплой без учётки Infisical.
      # Поэтому проверяем ФАКТ: preflight должен сказать, что KC настроен.
      - name: Verify KC bridge actually got its secret
        if: steps.which.outputs.backend == 'true'
        run: |
          cid=$(docker compose ps -q lore-backend)
          # Проверка зависит от режима, и это НЕ усложнение ради усложнения.
          #
          # Пока auth выключен, представиться админом можно заголовком
          # X-Seer-Role — без него эндпоинт под requireAdmin отдаёт 403, и
          # проверка ложно объявила бы мост несконфигуренным.
          #
          # После включения auth бэкенд этому заголовку НЕ ДОВЕРЯЕТ (в том и
          # смысл), поэтому тот же запрос честно получает 401. Прежняя проверка
          # уронила бы деплой ровно в момент успешного включения — отказ,
          # неотличимый от настоящей поломки.
          #
          # Поэтому 401 при LORE_AUTH_ENABLED=true — это ПОДТВЕРЖДЕНИЕ: бэкенд
          # поднялся и требует токен. А вот 200 в этом режиме означал бы, что
          # флаг не доехал до сборки (build-time!) и auth молча остался выключен.
          code=$(docker exec "$cid" curl -s -o /tmp/pf.json -w '%{http_code}' -m 10 \
            -H 'X-Seer-Role: admin' http://127.0.0.1:9100/lore/kc/auth-preflight || echo 000)
          body=$(docker exec "$cid" cat /tmp/pf.json 2>/dev/null || true)
          echo "auth-preflight -> HTTP $code"
          if [ "${LORE_AUTH_ENABLED}" = "true" ]; then
            case "$code" in
              401|403) echo "auth включён и ЗАСТАВЛЯЕТ предъявлять токен — заголовку больше не верят" ;;
              200) echo "::error::auth должен быть включён, но эндпоинт пустил по заголовку X-Seer-Role. Значит LORE_AUTH_ENABLED не попал в СБОРКУ образа (quarkus.oidc.enabled фиксируется на build-time) — проверьте build-args в compose."; exit 1 ;;
              *)   echo "::error::бэкенд не ответил на auth-preflight (HTTP $code)"; exit 1 ;;
            esac
          else
            case "$body" in
              *'"kc_configured":true'*) echo "KC-мост настроен" ;;
              *) echo "::error::KC-мост не получил секрет (kc_configured != true). Секреты берутся из Infisical по machine identity — проверьте LORE_SECRETS_* и что identity добавлена в проект."; exit 1 ;;
            esac
          fi

      - name: Verify frontend serves
        if: steps.which.outputs.frontend == 'true'
        run: |
          cid=$(docker compose ps -q lore-app)
          code=$(docker exec "$cid" curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/)
          if [ "$code" != "200" ]; then
            echo "::error::frontend (in-container) returned HTTP $code"
            exit 1
          fi
          echo "frontend OK ($code)"

      # Telegram notifications — same pattern as aida-root's cd.yml (secrets.
      # TELEGRAM_TOKEN/TELEGRAM_CHAT_ID, silent no-op if unset so this doesn't
      # fail for anyone who hasn't configured them on THIS repo — Forgejo
      # secrets are per-repo, aida-root's config does not carry over here).
      # Only success/failure, no "start" ping: this fires on every push to
      # develop, and a start-notification for every local dev push would be
      # noisy where aida-root's tag-triggered prod releases are not.
      # continue-on-error + trailing `exit 0`: Telegram is best-effort only.
      # 2026-07-13: api.telegram.org:443 was unreachable from this host entirely
      # (host + both docker networks timed out at the TCP level). 2026-07-14: the
      # act_runner containers were given an outbound HTTP(S) proxy (runner.envs
      # HTTP_PROXY/HTTPS_PROXY -> host.docker.internal:10809, routing through the
      # host's local VPN client; NO_PROXY keeps the Forgejo-internal checkout
      # unproxied) and Telegram is reachable again — confirmed live via a real
      # workflow_dispatch run reaching the user's Telegram. Kept best-effort
      # anyway: the proxy is a detail of THIS dev machine, not guaranteed to
      # exist on whatever CI host eventually replaces it, so an unreachable
      # Telegram still must not turn a healthy deploy red.
      - name: Notify success
        if: success()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "${TG_TOKEN}" ] && exit 0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "✅ LORE local CD deployed\nRef: %s\nSHA: %s\nBy: %s\nService: %s\n\nRun: %s" \
            "${{ github.ref_name }}" "${{ github.sha }}" "${{ github.actor }}" \
            "${{ github.event.inputs.service || 'both' }}" "$RUN_URL")
          jq -n --arg chat "$TG_CHAT" --arg text "$MSG" \
            '{"chat_id":$chat,"text":$text}' > /tmp/tg-payload.json
          for attempt in 1 2 3; do
            if curl -sf --max-time 10 -X POST \
                 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d @/tmp/tg-payload.json; then
              echo "[tg] success notification sent (attempt $attempt)"
              break
            fi
            echo "::warning::[tg] success-notify attempt $attempt/3 failed"
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          exit 0

      - name: Notify failure
        if: failure()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "${TG_TOKEN}" ] && exit 0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "❌ LORE local CD FAILED\nRef: %s\nSHA: %s\nBy: %s\nService: %s\n\nRun: %s" \
            "${{ github.ref_name }}" "${{ github.sha }}" "${{ github.actor }}" \
            "${{ github.event.inputs.service || 'both' }}" "$RUN_URL")
          jq -n --arg chat "$TG_CHAT" --arg text "$MSG" \
            '{"chat_id":$chat,"text":$text}' > /tmp/tg-payload.json
          for attempt in 1 2 3; do
            if curl -sf --max-time 10 -X POST \
                 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                 -H "Content-Type: application/json" \
                 -d @/tmp/tg-payload.json; then
              echo "[tg] failure notification sent (attempt $attempt)"
              break
            fi
            echo "::warning::[tg] failure-notify attempt $attempt/3 failed"
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          exit 0
